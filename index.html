<!doctype html>
<html lang="th">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>TTAT Ranking Viewer</title>

  <style>
    :root {
      --navy: #06162f;
      --navy2: #0b2347;
      --blue: #0057ff;
      --red: #e60023;
      --bg: #f4f7fb;
      --card: #ffffff;
      --line: #e5eaf1;
      --text: #071225;
      --muted: #64748b;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
    }

    .hero {
      background:
        radial-gradient(circle at top right, rgba(0,87,255,.35), transparent 35%),
        linear-gradient(135deg, var(--navy), var(--navy2));
      color: #fff;
      padding: 34px 18px 52px;
      border-bottom: 5px solid var(--red);
    }

    .hero-inner {
      max-width: 1320px;
      margin: 0 auto;
    }

    .brand {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 7px 13px;
      border: 1px solid rgba(255,255,255,.25);
      border-radius: 999px;
      background: rgba(255,255,255,.08);
      font-weight: 800;
      letter-spacing: .04em;
      font-size: 13px;
    }

    .brand-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: var(--red);
      box-shadow: 0 0 0 4px rgba(230,0,35,.25);
    }

    h1 {
      margin: 18px 0 8px;
      font-size: clamp(34px, 5vw, 58px);
      line-height: 1;
      letter-spacing: -.04em;
    }

    .sub {
      margin: 0;
      max-width: 760px;
      color: rgba(255,255,255,.78);
      font-size: 17px;
      line-height: 1.6;
    }

    .wrap {
      max-width: 1320px;
      margin: -30px auto 34px;
      padding: 0 18px;
    }

    .panel {
      background: rgba(255,255,255,.96);
      border: 1px solid rgba(226,232,240,.9);
      border-radius: 22px;
      padding: 18px;
      box-shadow: 0 20px 50px rgba(2,8,23,.14);
      backdrop-filter: blur(10px);
    }

    .grid {
      display: grid;
      grid-template-columns: 1.05fr 1.2fr 1.45fr .9fr;
      gap: 14px;
    }

    .card {
      background: #fff;
      border: 1px solid var(--line);
      border-radius: 18px;
      padding: 15px;
      min-height: 112px;
    }

    label {
      display: block;
      font-weight: 900;
      font-size: 14px;
      margin-bottom: 9px;
      color: #0f172a;
    }

    select,
    input {
      width: 100%;
      height: 48px;
      padding: 0 14px;
      border-radius: 14px;
      border: 1px solid #cbd5e1;
      font-size: 15px;
      outline: none;
      background: #fff;
    }

    select:focus,
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(0,87,255,.12);
    }

    .row {
      display: flex;
      gap: 9px;
      align-items: center;
      margin-top: 12px;
    }

    .row input[type="checkbox"] {
      width: 18px;
      height: 18px;
      accent-color: var(--blue);
    }

    .muted {
      color: var(--muted);
      font-weight: 700;
      font-size: 13px;
    }

    .status {
      font-weight: 900;
      color: var(--navy);
      line-height: 1.5;
    }

    .table-section {
      margin-top: 18px;
      background: #fff;
      border: 1px solid var(--line);
      border-radius: 22px;
      overflow: hidden;
      box-shadow: 0 10px 30px rgba(15,23,42,.08);
    }

    .table-title {
      display: flex;
      align-items: center;
      justify-content: flex-start;
      gap: 12px;
      padding: 16px 18px;
      background: linear-gradient(90deg, #ffffff, #f8fbff);
      border-bottom: 1px solid var(--line);
    }

    .table-title strong {
      font-size: 18px;
    }

    .tableWrap {
      overflow: auto;
      max-height: calc(100vh - 250px);
    }

    table {
      width: 100%;
      min-width: 1120px;
      border-collapse: separate;
      border-spacing: 0;
    }

    th,
    td {
      padding: 13px 14px;
      border-bottom: 1px solid #edf2f7;
      white-space: nowrap;
      text-align: center;
      vertical-align: middle;
      font-size: 14px;
    }

    th {
      position: sticky;
      top: 0;
      z-index: 3;
      background: var(--navy);
      color: #fff;
      font-weight: 900;
    }

    tbody tr:nth-child(even) td {
      background: #fafcff;
    }

    tbody tr:hover td {
      background: #eef6ff;
    }

    th.left-col,
    td.left-col {
      text-align: left !important;
    }

    td:first-child,
    th:first-child {
      font-weight: 900;
    }

    tbody td:last-child {
      font-weight: 900;
      color: var(--blue);
    }

    @media (max-width: 1100px) {
      .grid {
        grid-template-columns: 1fr 1fr;
      }
    }

    @media (max-width: 720px) {
      .hero {
        padding: 26px 16px 44px;
      }

      .wrap {
        margin-top: -24px;
        padding: 0 12px;
      }

      .panel {
        padding: 13px;
        border-radius: 18px;
      }

      .grid {
        grid-template-columns: 1fr;
        gap: 10px;
      }

      .card {
        min-height: auto;
        padding: 13px;
        border-radius: 16px;
      }

      h1 {
        font-size: 34px;
      }

      .sub {
        font-size: 14px;
      }

      .table-title {
        flex-direction: column;
        align-items: flex-start;
      }

      .tableWrap {
        max-height: none;
      }

      table {
        min-width: 980px;
      }

      th,
      td {
        padding: 11px 12px;
        font-size: 13px;
      }
    }
  </style>
</head>

<body>
  <header class="hero">
    <div class="hero-inner">
      <div class="brand">
        <span class="brand-dot"></span>
        THE TABLE TENNIS ASSOCIATION OF THAILAND
      </div>

      <h1>TTAT Ranking Viewer</h1>
      <p class="sub">
        ค้นหาอันดับนักกีฬา รหัส สังกัด และดูคะแนนสะสมจากรายการแข่งขันของสมาคมกีฬาเทเบิลเทนนิสแห่งประเทศไทย
      </p>
    </div>
  </header>

  <main class="wrap">
    <section class="panel">
      <div class="grid">
        <div class="card">
          <label for="sheetSelect">เลือกประเภท</label>
          <select id="sheetSelect"></select>
        </div>

        <div class="card">
          <label for="q">ค้นหา</label>
          <input id="q" placeholder="ชื่อ / สังกัด / รหัส" />
        </div>

        <div class="card">
          <label for="eventSelect">เลือกรายการแข่งขัน</label>
          <select id="eventSelect"></select>

          <div class="row">
            <input id="eventOnlyPositive" type="checkbox" />
            <span class="muted">เฉพาะคนที่มีคะแนนรายการที่เลือก (&gt; 0)</span>
          </div>
        </div>

        <div class="card">
          <label>สถานะ</label>
          <div id="status" class="status">กำลังเริ่มต้น…</div>
        </div>
      </div>
    </section>

    <section class="table-section">
      <div class="table-title">
        <strong>Ranking Table</strong>
      </div>

      <div class="tableWrap">
        <table>
          <thead id="thead"></thead>
          <tbody id="tbody"></tbody>
        </table>
      </div>
    </section>
  </main>

  <script src="script.js" defer></script>
</body>
</html>
